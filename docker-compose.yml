services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: scriptorium
      MYSQL_USER: scriptorium
      MYSQL_PASSWORD: scriptorium
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pscriptorium"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
