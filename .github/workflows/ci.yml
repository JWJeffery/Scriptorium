name: Scriptorium CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Build and typecheck
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: mysql://scriptorium:scriptorium@127.0.0.1:3306/scriptorium
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: scriptorium
          MYSQL_USER: scriptorium
          MYSQL_PASSWORD: scriptorium
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uscriptorium -pscriptorium"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Prepare environment
        run: cp .env.example .env

      - name: Validate Prisma schema
        run: pnpm prisma:validate

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Deploy MySQL migration
        run: pnpm prisma:migrate:deploy

      - name: Typecheck web app
        run: pnpm typecheck

      - name: Build web app
        run: pnpm build
