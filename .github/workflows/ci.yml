name: Scriptorium CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Build and typecheck
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: mysql://scriptorium:scriptorium@localhost:3306/scriptorium
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Validate Prisma schema
        run: pnpm prisma:validate

      - name: Typecheck web app
        run: pnpm typecheck

      - name: Build web app
        run: pnpm build
