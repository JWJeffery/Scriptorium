name: Scriptorium CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Build and typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Validate Prisma schema
        run: pnpm prisma:validate
        env:
          DATABASE_URL: postgresql://scriptorium:scriptorium@localhost:5432/scriptorium?schema=public

      - name: Typecheck web app
        run: pnpm typecheck

      - name: Build web app
        run: pnpm build
        env:
          DATABASE_URL: postgresql://scriptorium:scriptorium@localhost:5432/scriptorium?schema=public
