name: Scriptorium CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write

defaults:
  run:
    shell: bash

jobs:
  typecheck:
    name: Typecheck and build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: mysql://scriptorium:scriptorium@127.0.0.1:3306/scriptorium
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Prepare environment
        run: cp .env.example .env

      - name: Validate Prisma schema
        run: pnpm prisma:validate

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Verify development ledger
        run: node scripts/verify-development-ledger.mjs

      - name: Verify Milestone 1 fixture
        run: node scripts/verify-milestone-1.mjs

      - name: Verify Milestone 3 TXT and Markdown fixtures
        run: node scripts/verify-milestone-3-text-markdown.mjs

      - name: Verify Milestone 4 text snapshot policy
        run: node scripts/verify-milestone-4-snapshot-policy.mjs

      - name: Typecheck web app
        id: typecheck
        run: |
          set +e
          pnpm typecheck > typecheck.log 2>&1
          code=$?
          cat typecheck.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload typecheck log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-log
          path: typecheck.log

      - name: Comment typecheck failure on Issue 1
        if: steps.typecheck.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('typecheck.log', 'utf8');
            const tail = log.split('\n').slice(-80).join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 1,
              body: `CI typecheck failed for ${context.sha}.\n\n\`\`\`text\n${tail}\n\`\`\``
            });

      - name: Fail if typecheck failed
        if: steps.typecheck.outputs.exit_code != '0'
        run: exit 1

      - name: Build web app
        id: build
        run: |
          set +e
          pnpm build > build.log 2>&1
          code=$?
          cat build.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Comment build failure on Issue 1
        if: steps.build.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('build.log', 'utf8');
            const tail = log.split('\n').slice(-100).join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 1,
              body: `CI build failed for ${context.sha}.\n\n\`\`\`text\n${tail}\n\`\`\``
            });

      - name: Fail if build failed
        if: steps.build.outputs.exit_code != '0'
        run: exit 1

  mysql-migration:
    name: MySQL migration deploy
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: mysql://scriptorium:scriptorium@127.0.0.1:3306/scriptorium
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: scriptorium
          MYSQL_USER: scriptorium
          MYSQL_PASSWORD: scriptorium
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uscriptorium -pscriptorium"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Prepare environment
        run: cp .env.example .env

      - name: Validate Prisma schema
        run: pnpm prisma:validate

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Deploy MySQL migration
        run: pnpm prisma:migrate:deploy
