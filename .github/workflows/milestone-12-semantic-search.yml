name: Milestone 12 Semantic Search

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  verify-semantic-search:
    name: Verify semantic search
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: mysql://scriptorium:scriptorium@127.0.0.1:3306/scriptorium
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Prepare environment
        run: cp .env.example .env

      - name: Validate Prisma schema
        run: pnpm prisma:validate

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Verify semantic search
        run: node scripts/verify-milestone-12-semantic-search.mjs

      - name: Typecheck web app
        run: pnpm typecheck

      - name: Build web app
        run: pnpm build
